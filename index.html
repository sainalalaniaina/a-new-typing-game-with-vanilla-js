<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Test</title>
    <link rel="icon" href="favicon.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="about.css">

</head>

<body>
    <header>
        <div class="header-content">
            <img src="logo.png" alt="" class="logo">
            <nav>
                <a href="index.html" id="jou">Jouer</a>
                <a href="about.html">À propos</a>
                <div id="user-display"></div>

            </nav>
        </div>

        <span class="msg-non-connecte">🔒 Connectez-vous pour accéder à toutes les options et les conseils</span>


        <div id="lang-selector">
            <label for="lang">Langue :</label>
            <select id="lang">
                <option value="fr">🇫🇷 Français</option>
                <option value="en">🇬🇧 Anglais</option>
                <option value="es">🇪🇸 Espagnol</option>
                <option value="it">🇮🇹 Italien</option>
                <option value="mg">🇲🇬 Malagasy</option>
                <option value="tr">🇹🇷 Turc</option>
                <option value="ru">🇷🇺 Russe</option>
                <option value="ko">🇰🇷 Coréen</option>
                <option value="ja">🇯🇵 Japonais</option>
                <option value="zh">🇨🇳 Chinois</option>
            </select>
        </div>

        <div id="word-count-selector">
            <label for="word-count">Mots :</label>
            <select id="word-count">
                <option value="10">10 mots</option>
                <option value="30" selected>30 mots</option>
                <option value="40">40 mots</option>
                <option value="60">60 mots</option>
                <option value="80">80 mots</option>
            </select>
        </div>

        <div id="mode-buttons" class="mode-buttons">
            <label for="mode">Niveau:</label>
            <button class="mode-btn active" data-mode="easy">Facile</button>
            <button class="mode-btn" data-mode="medium">Moyen</button>
            <button class="mode-btn" data-mode="hard">Difficile</button>
        </div>
    </header>

    <main>
        <p id="word-display"></p>
        <input type="text" id="input-field" placeholder="Commencez à taper..." autofocus>
        <p id="results">WPM : 0 | Accuracy : 0% | Score : 0</p>
        <p id="timer">⏱️ Temps : 0s</p>
        <button id="restart-btn">Recommencer</button>

    </main>

    <script src="script.js"></script>
</body>

</html>
