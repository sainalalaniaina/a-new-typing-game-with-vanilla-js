<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Typing Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="about.css">
</head>
<body>

    <header>
        <img src="logo.png" alt="logo" class="logo">
        <nav>
            <a href="index.html">Jouer</a>
            <a href="about.html">À propos</a>
            <a href="login.html" id="connex">Connexion</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Créer un compte</h2>
            <p class="auth-subtitle">Rejoins l'aventure !</p>

            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Choisis un pseudo...">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="password-confirm">Confirmer le mot de passe</label>
                <input type="password" id="password-confirm" placeholder="••••••••">
            </div>

            <p id="register-error" class="error-msg"></p>
            <p id="register-success" class="success-msg"></p>

            <button id="register-btn">Créer le compte</button>

            <p class="auth-switch">
                Déjà un compte ?
                <a href="login.html">Se connecter</a>
            </p>
        </div>
    </main>

    <script src="register.js"></script>
</body>
</html>
